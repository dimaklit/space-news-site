<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AstroTrack — Space News Dashboard</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --bg-color: #080810;
            --card-bg: #11111e;
            --text-color: #fffffe;
            --text-muted: #94a1b2;
            --accent: #7f5af0;
            --accent-hover: #9272f2;
            --border-color: #1e1e2f;
        }

        [lang="he"] {
            direction: rtl;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(to right, #7f5af0, #2cb67d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        select, button {
            background-color: var(--card-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        select:hover, button:hover {
            border-color: var(--accent);
        }

        .toggle-btn.active {
            background-color: var(--accent);
            border-color: var(--accent);
        }

        /* Интерактивный Дашборд */
        .dashboard-grid {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 35px;
        }

        .dash-card {
            background: #141424;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            color: #fff;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 240px;
        }

        .dash-card h3 {
            margin-top: 0;
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding-bottom: 10px;
            margin-bottom: 10px;
        }

        .launch-timer {
            font-size: 26px;
            font-family: monospace;
            color: #7f5af0;
            font-weight: bold;
            margin: 10px 0;
            letter-spacing: 1px;
        }

        /* Контейнер для живой зум-карты Leaflet */
        .iss-map-container {
            width: 100%;
            height: 130px;
            border-radius: 8px;
            margin-top: auto;
            border: 1px solid rgba(255,255,255,0.05);
            overflow: hidden;
            z-index: 1;
            background-color: #0b0b14;
        }

        .skymap-container {
            width: 100%;
            height: 130px;
            border-radius: 8px;
            background: radial-gradient(circle at center, #161630 0%, #05050b 100%);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: auto;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 2s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100__ { opacity: 0.2; }
            50% { opacity: 1; }
        }

        /* Сетка новостей */
        .news-grid {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }

        .news-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease, border-color 0.3s ease;
            text-decoration: none;
            color: inherit;
        }

        .news-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
        }

        .news-img-wrapper {
            background-color: #16162a;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 140px;
            border-bottom: 1px solid var(--border-color);
            position: relative;
        }

        .news-emoji {
            font-size: 56px;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.08));
            transition: transform 0.3s ease;
        }

        .news-card:hover .news-emoji {
            transform: scale(1.1) rotate(5deg);
        }

        .news-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .news-source {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent);
            font-weight: 700;
            margin-bottom: 8px;
        }

        .news-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .news-summary {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.6;
            flex-grow: 1;
            margin-bottom: 15px;
        }

        .news-date {
            font-size: 12px;
            color: var(--text-muted);
            border-top: 1px solid #1a1a2e;
            padding-top: 10px;
            margin-top: auto;
        }

        /* Календарь пусков */
        .launches-section {
            width: 100%;
            max-width: 1200px;
            margin-top: 20px;
            margin-bottom: 50px;
        }

        .launches-title {
            font-size: 22px;
            margin-bottom: 20px;
            border-left: 4px solid var(--accent);
            padding-left: 10px;
        }

        body[dir="rtl"] .launches-title {
            border-left: none;
            border-right: 4px solid var(--accent);
            padding-left: 0;
            padding-right: 10px;
        }

        .launch-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .launch-item {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 15px 20px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .launch-name {
            font-weight: 600;
            color: #2cb67d;
        }

        .launch-details {
            font-size: 14px;
            color: var(--text-muted);
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                align-items: flex-start;
            }
            .controls {
                width: 100%;
                justify-content: space-between;
            }
            .launch-item {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>

    <header id="main-header">
        <h1 id="site-title">AstroTrack</h1>
        <div class="controls">
            <select id="lang-select" onchange="changeLanguage(this.value)">
                <option value="en">English</option>
                <option value="ru">Русский</option>
                <option value="he">עברית</option>
            </select>
            <button id="mode-btn" class="toggle-btn" onclick="toggleMode()">Regular Mode</button>
        </div>
    </header>

    <div class="dashboard-grid">
        <div class="dash-card">
            <h3 id="dash-sky-title">🌌 Локальное небо (Kiryat Gat)</h3>
            <div class="skymap-container" id="sky-map">
                <div style="z-index: 2; text
