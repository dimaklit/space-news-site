<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AstroTrack — Space News Dashboard</title>
    <style>
        :root {
            --bg-color: #080810;
            --card-bg: #11111e;
            --text-color: #fffffe;
            --text-muted: #94a1b2;
            --accent: #7f5af0;
            --accent-hover: #9272f2;
            --border-color: #1e1e2f;
        }

        [lang="he"] {
            direction: rtl;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(to right, #7f5af0, #2cb67d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        select, button {
            background-color: var(--card-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        select:hover, button:hover {
            border-color: var(--accent);
        }

        .toggle-btn.active {
            background-color: var(--accent);
            border-color: var(--accent);
        }

        /* Адаптивная сетка для карточек новостей */
        .news-grid {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }

        .news-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease, border-color 0.3s ease;
            text-decoration: none;
            color: inherit;
        }

        .news-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
        }

        /* Стилизация картинок из медиатеки скрапера */
        .news-img-wrapper {
            width: 100%;
            height: 190px;
            overflow: hidden;
            background-color: #05050a;
            position: relative;
        }

        .news-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            transition: transform 0.5s ease;
        }

        .news-card:hover .news-img {
            transform: scale(1.04);
        }

        .news-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .news-source {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent);
            font-weight: 700;
            margin-bottom: 8px;
        }

        .news-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .news-summary {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.6;
            flex-grow: 1;
            margin-bottom: 15px;
        }

        .news-date {
            font-size: 12px;
            color: var(--text-muted);
            border-top: 1px solid #1a1a2e;
            padding-top: 10px;
            margin-top: auto;
        }

        /* Расписание пусков */
        .launches-section {
            width: 100%;
            max-width: 1200px;
            margin-top: 20px;
        }

        .launches-title {
            font-size: 22px;
            margin-bottom: 20px;
            border-left: 4px solid var(--accent);
            padding-left: 10px;
        }

        body[dir="rtl"] .launches-title {
            border-left: none;
            border-right: 4px solid var(--accent);
            padding-left: 0;
            padding-right: 10px;
        }

        .launch-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .launch-item {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 15px 20px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .launch-name {
            font-weight: 600;
            color: #2cb67d;
        }

        .launch-details {
            font-size: 14px;
            color: var(--text-muted);
        }

        @media (max-width: 600px) {
            header {
                flex-direction: column;
                align-items: flex-start;
            }
            .controls {
                width: 100%;
                justify-content: space-between;
            }
            .launch-item {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>

    <header id="main-header">
        <h1 id="site-title">AstroTrack</h1>
        <div class="controls">
            <select id="lang-select" onchange="changeLanguage(this.value)">
                <option value="en">English</option>
                <option value="ru">Русский</option>
                <option value="he">עברית</option>
            </select>
            <button id="mode-btn" class="toggle-btn" onclick="toggleMode()">Regular Mode</button>
        </div>
    </header>

    <main class="news-grid" id="news-container">
        </main>

    <section class="launches-section">
        <h2 class="launches-title" id="launches-heading">Upcoming Space Launches</h2>
        <div class="launch-list" id="launches-container">
            </div>
    </section>

    <script>
        let currentLang = 'en';
        let currentMode = 'regular'; // regular или kids
        let newsData = [];

        // Тексты интерфейса для локализации
        const translations = {
            en: { title: "AstroTrack", regular: "Regular Mode", kids: "Kids Edition 🚀", launches: "Upcoming Space Launches" },
            ru: { title: "AstroTrack", regular: "Обычный режим", kids: "Детский режим 🚀", launches: "Ближайшие космические пуски" },
            he: { title: "AstroTrack", regular: "מצב רגיל", kids: "גרסת ילדים 🚀", launches: "שיגורי חלל קרובים" }
        };

        async function init() {
            try {
                // Загружаем новости
                const newsResponse = await fetch('news.json?t=' + Date.now());
                newsData = await newsResponse.json();
                
                // Загружаем пуски
                const launchResponse = await fetch('launches.json?t=' + Date.now());
                const launchData = await launchResponse.json();
                
                renderNews();
                renderLaunches(launchData);
            } catch (err) {
                console.error("Ошибка инициализации данных: ", err);
            }
        }

function renderNews() {
    const container = document.getElementById('news-container');
    container.innerHTML = '';

    newsData.forEach(article => {
        let title = article.title_en;
        let summary = article.summary_en;

        if (currentLang === 'ru') {
            title = currentMode === 'kids' ? article.title_ru_kids : article.title_ru;
            summary = currentMode === 'kids' ? article.summary_ru_kids : article.summary_ru;
        } else if (currentLang === 'he') {
            title = currentMode === 'kids' ? article.title_he_kids : article.title_he;
            summary = currentMode === 'kids' ? article.summary_he_kids : article.summary_he;
        } else if (currentLang === 'en' && currentMode === 'kids') {
            title = `🚀 Space News: ${article.title_en} ✨`;
            summary = `🌟 Hey future astronaut! Check this out: ${article.summary_en} 🛰️🔭`;
        }

        // ДИНАМИЧЕСКИЙ ГЕНЕРАТОР ПРОМТОВ: Очищаем английский заголовок от спецсимволов и цифр,
        // чтобы ИИ сфокусировался на сути миссии и нарисовал идеальный арт
        let cleanPrompt = article.title_en
            .replace(/[0-9]/g, '') 
            .replace(/launches|satellites|mission|scraped|coverage|live/gi, '')
            .trim();
        
        // Формируем финальный стилизованный ИИ-промт для Stable Diffusion
        let aiPromptEncoded = encodeURIComponent(`${cleanPrompt}, sci-fi digital illustration, cinematic lighting, epic cosmic background, vibrant space art, highly detailed, masterpieces, artstation style`);
        
        // Сверхстабильный URL генерации, который обрабатывается браузером как обычная картинка
        let dynamicAiImage = `https://image.pollinations.ai/prompt/${aiPromptEncoded}`;

        const card = document.createElement('a');
        card.className = 'news-card';
        card.href = article.link;
        card.target = '_blank';

        card.innerHTML = `
            <div class="news-img-wrapper">
                <img class="news-img" src="${dynamicAiImage}" alt="AstroTrack AI Illustration" loading="lazy">
            </div>
            <div class="news-content">
                <div class="news-source">${article.source}</div>
                <div class="news-title">${title}</div>
                <div class="news-summary">${summary}</div>
                <div class="news-date">${article.date_display}</div>
            </div>
        `;
        container.appendChild(card);
    });
}
        function renderLaunches(launches) {
            const container = document.getElementById('launches-container');
            container.innerHTML = '';

            if(!launches || launches.length === 0) {
                container.innerHTML = '<div class="launch-item">No upcoming launches found</div>';
                return;
            }

            launches.forEach(launch => {
                const date = new Date(launch.window_start).toLocaleString(currentLang === 'en' ? 'en-US' : currentLang === 'ru' ? 'ru-RU' : 'he-IL');
                const item = document.createElement('div');
                item.className = 'launch-item';
                item.innerHTML = `
                    <div>
                        <div class="launch-name">${launch.name_en}</div>
                        <div class="launch-details">${launch.rocket} | ${launch.location}</div>
                    </div>
                    <div style="font-weight: bold; color: #7f5af0;">${date}</div>
                `;
                container.appendChild(item);
            });
        }

        function changeLanguage(lang) {
            currentLang = lang;
            document.documentElement.lang = lang;
            
            // Переключаем направление чтения для иврита
            if (lang === 'he') {
                document.body.setAttribute('dir', 'rtl');
            } else {
                document.body.removeAttribute('dir');
            }

            updateInterfaceTexts();
            renderNews();
        }

        function toggleMode() {
            currentMode = currentMode === 'regular' ? 'kids' : 'regular';
            const btn = document.getElementById('mode-btn');
            
            if (currentMode === 'kids') {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
            
            updateInterfaceTexts();
            renderNews();
        }

        function updateInterfaceTexts() {
            const t = translations[currentLang];
            document.getElementById('site-title').textContent = t.title;
            document.getElementById('mode-btn').textContent = currentMode === 'regular' ? t.regular : t.kids;
            document.getElementById('launches-heading').textContent = t.launches;
        }

        // Запуск при загрузке страницы
        window.onload = init;
    </script>
</body>
</html>
