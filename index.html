<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AstroTrack — Space News Dashboard</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --bg-color: #080810;
            --card-bg: #11111e;
            --text-color: #fffffe;
            --text-muted: #94a1b2;
            --accent: #7f5af0;
            --accent-hover: #9272f2;
            --border-color: #1e1e2f;
        }

        [lang="he"] {
            direction: rtl;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(to right, #7f5af0, #2cb67d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        select, button {
            background-color: var(--card-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        select:hover, button:hover {
            border-color: var(--accent);
        }

        .toggle-btn.active {
            background-color: var(--accent);
            border-color: var(--accent);
        }

        .dashboard-grid {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 35px;
        }

        .dash-card {
            background: #141424;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            color: #fff;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 240px;
        }

        .dash-card h3 {
            margin-top: 0;
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding-bottom: 10px;
            margin-bottom: 10px;
        }

        .launch-timer {
            font-size: 26px;
            font-family: monospace;
            color: #7f5af0;
            font-weight: bold;
            margin: 10px 0;
            letter-spacing: 1px;
        }

        .iss-map-container {
            width: 100%;
            height: 130px;
            border-radius: 8px;
            margin-top: auto;
            border: 1px solid rgba(255,255,255,0.05);
            overflow: hidden;
            z-index: 1;
            background-color: #0b0b14;
        }

        .skymap-container {
            width: 100%;
            height: 130px;
            border-radius: 8px;
            background: radial-gradient(circle at center, #161630 0%, #05050b 100%);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: auto;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 2s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }

        .news-grid {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }

        .news-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease, border-color 0.3s ease;
            text-decoration: none;
            color: inherit;
        }

        .news-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
        }

        .news-img-wrapper {
            background-color: #16162a;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 140px;
            border-bottom: 1px solid var(--border-color);
            position: relative;
        }

        .news-emoji {
            font-size: 56px;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.08));
            transition: transform 0.3s ease;
        }

        .news-card:hover .news-emoji {
            transform: scale(1.1) rotate(5deg);
        }

        .news-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .news-source {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent);
            font-weight: 700;
            margin-bottom: 8px;
        }

        .news-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .news-summary {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.6;
            flex-grow: 1;
            margin-bottom: 15px;
        }

        .news-date {
            font-size: 12px;
            color: var(--text-muted);
            border-top: 1px solid #1a1a2e;
            padding-top: 10px;
            margin-top: auto;
        }

        .launches-section {
            width: 100%;
            max-width: 1200px;
            margin-top: 20px;
            margin-bottom: 50px;
        }

        .launches-title {
            font-size: 22px;
            margin-bottom: 20px;
            border-left: 4px solid var(--accent);
            padding-left: 10px;
        }

        body[dir="rtl"] .launches-title {
            border-left: none;
            border-right: 4px solid var(--accent);
            padding-left: 0;
            padding-right: 10px;
        }

        .launch-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .launch-item {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 15px 20px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .launch-name {
            font-weight: 600;
            color: #2cb67d;
        }

        .launch-details {
            font-size: 14px;
            color: var(--text-muted);
        }

        @media (max-width: 768px) {
            header { flex-direction: column; align-items: flex-start; }
            .controls { width: 100%; justify-content: space-between; }
            .launch-item { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>

    <header id="main-header">
        <h1 id="site-title">AstroTrack</h1>
        <div class="controls">
            <select id="lang-select" onchange="changeLanguage(this.value)">
                <option value="en">English</option>
                <option value="ru">Русский</option>
                <option value="he">עברית</option>
            </select>
            <button id="mode-btn" class="toggle-btn" onclick="toggleMode()">Regular Mode</button>
        </div>
    </header>

    <div class="dashboard-grid">
        <div class="dash-card">
            <h3 id="dash-sky-title">🌌 Local Sky (Kiryat Gat)</h3>
            <div class="skymap-container" id="sky-map">
                <div style="z-index: 2; text-align: center; font-size: 12px; text-shadow: 0 2px 4px rgba(0,0,0,0.8);">
                    <strong id="sky-constellation">Telemetry link...</strong><br>
                    <span style="font-size: 10px; color: #2cb67d;">Current tracking sector</span>
                </div>
            </div>
        </div>

        <div class="dash-card">
            <h3 id="dash-alert-title">🚨 Spaceport Alerts</h3>
            <div id="launch-alert-status" style="font-size: 12px; color: #2cb67d; font-weight: 600;">Link established</div>
            <div class="launch-timer" id="countdown-timer">T-MINUS --:--:--</div>
            <div style="font-size: 11px; color: rgba(255,255,255,0.5); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" id="next-mission-name">Mission: Searching...</div>
        </div>

        <div class="dash-card">
            <h3 id="dash-iss-title">🛰️ ISS Orbit Tracker</h3>
            <div style="font-size: 12px; margin-bottom: 2px;">
                Position: <span id="iss-coords" style="color:#7f5af0; font-family: monospace; font-weight: bold;">Syncing...</span>
            </div>
            <div class="iss-map-container" id="iss-map"></div>
        </div>
    </div>

    <main class="news-grid" id="news-container"></main>

    <section class="launches-section">
        <h2 class="launches-title" id="launches-heading">Upcoming Space Launches</h2>
        <div class="launch-list" id="launches-container"></div>
    </section>

    <script>
        let currentLang = 'en';
        let currentMode = 'regular';
        let newsData = [];
        let launchData = [];
        let issMap = null;
        let issMarker = null;

        const translations = {
            en: { title: "AstroTrack", regular: "Regular Mode", kids: "Kids Edition 🚀", dashSky: "🌌 Local Sky (Kiryat Gat)", dashAlert: "🚨 Spaceport Alerts", dashIss: "🛰️ ISS Orbit Tracker", launches: "Upcoming Space Launches", waiting: "Calculating location...", telemetry: "Link established" },
            ru: { title: "AstroTrack", regular: "Обычный режим", kids: "Детский режим 🚀", dashSky: "🌌 Небо над Кирьят-Гатом", dashAlert: "🚨 Сигналы космодрома", dashIss: "🛰️ Наблюдение за МКС", launches: "Ближайшие космические пуски", waiting: "Вычисление позиции...", telemetry: "Связь установлена" },
            he: { title: "AstroTrack", regular: "מצב רגיל", kids: "גרסת ילדים 🚀", dashSky: "🌌 שמי קריית גת", dashAlert: "🚨 התראות נמל חלל", dashIss: "🛰️ מעקב תחנת החלל הבינלאומית", launches: "שיגורי חלל קרובים", waiting: "מחשב מיקום...", telemetry: "חיבור תקין" }
        };

        async function init() {
            try {
                updateInterfaceTexts();
                initSkyMap();

                const coordsEl = document.getElementById('iss-coords');
                let locationEl = document.getElementById('iss-location-text');
                if(!locationEl) {
                    locationEl = document.createElement('div');
                    locationEl.id = 'iss-location-text';
                    locationEl.style.fontSize = '12px';
                    locationEl.style.marginTop = '2px';
                    locationEl.style.color = '#2cb67d';
                    locationEl.style.fontWeight = '500';
                    locationEl.style.whiteSpace = 'nowrap';
                    locationEl.style.overflow = 'hidden';
                    locationEl.style.textOverflow = 'ellipsis';
                    coordsEl.parentElement.appendChild(locationEl);
                }
                locationEl.innerHTML = `🌍 Location: <span style="color:#aaa;">${translations[currentLang].waiting}</span>`;

                trackISS();

                const launchResponse = await fetch('launches.json?t=' + Date.now());
                launchData = await launchResponse.json();
                initLaunchTimer();
                renderLaunches();

                const newsResponse = await fetch('news.json?t=' + Date.now());
                newsData = await newsResponse.json();
                renderNews();
            } catch (err) {
                console.error("Critical boot core error: ", err);
            }
        }

        function renderNews() {
            const container = document.getElementById('news-container');
            container.innerHTML = '';

            if(!newsData || newsData.length === 0) return;

            newsData.forEach(article => {
                let title = article.title_en;
                let summary = article.summary_en;

                if (currentLang === 'ru') {
                    title = currentMode === 'kids' ? (article.title_ru_kids || `🚀 ${article.title_ru} ✨`) : article.title_ru;
                    summary = currentMode === 'kids' ? (article.summary_ru_kids || `🌟 Смотри, что в космосе: ${article.summary_ru} 🪐 Telescope`) : article.summary_ru;
                } else if (currentLang === 'he') {
                    title = currentMode === 'kids' ? (article.title_he_kids || `🚀 ${article.title_he} ✨`) : article.title_he;
                    summary = currentMode === 'kids' ? (article.summary_he_kids || `🌟 תראו מה קרה בחלל: ${article.summary_he} 🪐`) : article.summary_he;
                } else if (currentLang === 'en' && currentMode === 'kids') {
                    title = article.title_en_kids || `🚀 Space News: ${article.title_en} ✨`;
                    summary = article.summary_en_kids || `🌟 Hey future astronaut! Check this out: ${article.summary_en} 🛰️🔭`;
                }

                let emoji = "🌌";
                const titleLower = article.title_en.toLowerCase();
                if (titleLower.includes("starlink") || titleLower.includes("satellite")) emoji = "🛰️";
                else if (titleLower.includes("falcon") || titleLower.includes("launch") || titleLower.includes("rocket") || titleLower.includes("ula") || titleLower.includes("neutron")) emoji = "🚀";
                else if (titleLower.includes("dragon") || titleLower.includes("crew") || titleLower.includes("cargo") || titleLower.includes("spaceship")) emoji = "🛸";
                else if (titleLower.includes("mars") || titleLower.includes("martian")) emoji = "🔴";
                else if (titleLower.includes("moon") || titleLower.includes("lunar")) emoji = "🌙";
                else if (titleLower.includes("sun") || titleLower.includes("solar") || titleLower.includes("smile")) emoji = "☀️";
                else if (titleLower.includes("earth") || titleLower.includes("images") || titleLower.includes("view") || titleLower.includes("quito")) emoji = "🌍";
                else if (titleLower.includes("telescope") || titleLower.includes("hubble") || titleLower.includes("webb") || titleLower.includes("rescue")) emoji = "🔭";
                else if (titleLower.includes("astronaut") || titleLower.includes("iss") || titleLower.includes("station")) emoji = "👨‍🚀";

                const card = document.createElement('a');
                card.className = 'news-card';
                card.href = article.link;
                card.target = '_blank';
                card.innerHTML = `
                    <div class="news-img-wrapper"><div class="news-emoji">${emoji}</div></div>
                    <div class="news-content">
                        <div class="news-source">${article.source}</div>
                        <div class="news-title">${title}</div>
                        <div class="news-summary">${summary}</div>
                        <div class="news-date">${article.date_display}</div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function renderLaunches() {
            const container = document.getElementById('launches-container');
            container.innerHTML = '';
            if (!launchData || launchData.length === 0) {
                container.innerHTML = '<div class="launch-item">No upcoming launches available</div>';
                return;
            }
            launchData.forEach(launch => {
                const date = new Date(launch.window_start).toLocaleString(currentLang === 'en' ? 'en-US' : currentLang === 'ru' ? 'ru-RU' : 'he-IL');
                const item = document.createElement('div');
                item.className = 'launch-item';
                item.innerHTML = `
                    <div>
                        <div class="launch-name">${launch.name_en}</div>
                        <div class="launch-details">${launch.rocket} | ${launch.location}</div>
                    </div>
                    <div style="font-weight: bold; color: #7f5af0;">${date}</div>
                `;
                container.appendChild(item);
            });
        }

        function initSkyMap() {
            const map = document.getElementById('sky-map');
            const oldStars = map.querySelectorAll('.star');
            oldStars.forEach(s => s.remove());

            const constellations = {
                en: ["Orion Sector", "Ursa Major Sector", "Cassiopeia Quadrant", "Cygnus Star System"],
                ru: ["Сектор Ориона", "Большая Медведица", "Созвездие Кассиопеи", "Система Лебедя"],
                he: ["קבוצת אוריון", "הדובה הגדולה", "קבוצת קסיופאה", "מערכת ברבור"]
            };
            
            const hour = new Date().getHours();
            const currentList = constellations[currentLang] || constellations['en'];
            document.getElementById('sky-constellation').innerText = currentList[hour % currentList.length];

            for (let i = 0; i < 35; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.width = Math.random() * 2.5 + 'px';
                star.style.height = star.style.width;
                star.style.top = Math.random() * 100 + '%';
                star.style.left = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 2 + 's';
                map.appendChild(star);
            }
        }

        let audioContext = null;
        function playLaunchSiren() {
            try {
                if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(160, audioContext.currentTime);
                osc.frequency.linearRampToValueAtTime(320, audioContext.currentTime + 1.2);
                gain.gain.setValueAtTime(0.08, audioContext.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioContext.currentTime + 1.5);
                osc.connect(gain); gain.connect(audioContext.destination);
                osc.start(); osc.stop(audioContext.currentTime + 1.5);
            } catch(e) {}
        }

        function initLaunchTimer() {
            if (!launchData || launchData.length === 0) return;
            const nextLaunch = launchData[0];
            document.getElementById('next-mission-name').innerText = `${nextLaunch.name_en} (${nextLaunch.rocket})`;
            
            const launchDate = new Date(nextLaunch.window_start).getTime();

            setInterval(() => {
                const now = new Date().getTime();
                const diff = launchDate - now;

                if (diff <= 0) {
                    document.getElementById('countdown-timer').innerText = "LAUNCH 🚀";
                    document.getElementById('launch-alert-status').innerText = currentLang === 'ru' ? "⚠️ СТАРТ СОСТОЯЛСЯ!" : currentLang === 'he' ? "⚠️ השיגור החל!" : "⚠️ LIFT OFF!";
                    document.getElementById('launch-alert-status').style.color = "#ff5555";
                    return;
                }

                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((diff % (1000 * 60)) / 1000);

                document.getElementById('countdown-timer').innerText = 
                    `T-MINUS ${String(hours).padStart(2,'0')}:${String(minutes).padStart(2,'0')}:${String(seconds).padStart(2,'0')}`;

                if (hours === 0 && minutes === 10 && seconds === 0) {
                    document.getElementById('launch-alert-status').innerText = currentLang === 'ru' ? "🚨 10 МИНУТ ДО СТАРТА!" : currentLang === 'he' ? "🚨 10 דקות לשיגור!" : "🚨 10 MINUTES TO LAUNCH!";
                    document.getElementById('launch-alert-status').style.color = "#ffb86c";
                    playLaunchSiren();
                }
            }, 1000);
        }

        function trackISS() {
            const coordsEl = document.getElementById('iss-coords');
            const locationEl = document.getElementById('iss-location-text');

            if (!issMap) {
                issMap = L.map('iss-map', { zoomControl: false, attributionControl: false }).setView([31.6067, 34.7718], 3);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 9, minZoom: 2 }).addTo(issMap);
                
                const issIcon = L.divIcon({
                    html: '<div style="font-size: 24px; filter: drop-shadow(0 0 6px #7f5af0);">🛰️</div>',
                    iconSize: [30, 30],
                    iconAnchor: [15, 15],
                    className: 'custom-iss-icon'
                });
                issMarker = L.marker([31.6067, 34.7718], { icon: issIcon }).addTo(issMap);
            }

            function updatePosition() {
                fetch('https://api.wheretheiss.at/v1/satellites/25544')
                    .then(res => res.json())
                    .then(data => {
                        const lat = parseFloat(data.latitude);
                        const lng = parseFloat(data.longitude);
                        
                        coordsEl.innerText = `${lat.toFixed(4)}°, ${lng.toFixed(4)}°`;

                        const newLatLng = new L.LatLng(lat, lng);
                        issMarker.setLatLng(newLatLng);
                        
                        if (issMap.getZoom() === 3 && issMap.getCenter().lat === 31.6067) {
                            issMap.setView(newLatLng, 4); 
                        } else {
                            issMap.panTo(newLatLng, { 
                                animate: true, 
                                duration: 2.0, 
                                easeLinearity: 0.2,
                                noMoveStart: true 
                            });
                        }

                        fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&zoom=4&addressdetails=0`, {
                            headers: { 'User-Agent': 'AstroTrackSpaceDashboard/1.0' }
                        })
                        .then(geoRes => geoRes.json())
                        .then(geoData => {
                            let prefix = currentLang === 'ru' ? '🌍 Локация: ' : currentLang === 'he' ? '🌍 מיקום: ' : '🌍 Location: ';
                            if (geoData && geoData.display_name) {
                                const cleanLoc = geoData.display_name.split(',').slice(0, 2).join(',');
                                locationEl.innerHTML = `${prefix}<span style="color:#fff;">${cleanLoc}</span>`;
                            } else {
                                let ocean = currentLang === 'ru' ? 'Открытый океан' : currentLang === 'he' ? 'אוקיינוס פתוח' : 'Open Ocean';
                                locationEl.innerHTML = `${prefix}<span style="color:#94a1b2;">${ocean}</span>`;
                            }
                        })
                        .catch(() => {
                            let ocean = currentLang === 'ru' ? 'Открытый океан' : currentLang === 'he' ? 'אוקיינוס פתוח' : 'Open Ocean';
                            locationEl.innerHTML = `🌍 Location: <span style="color:#94a1b2;">${ocean}</span>`;
                        });
                    })
                    .catch(() => {
                        const time = Date.now() * 0.00003;
                        const mockLat = Math.sin(time) * 51.6;
                        const mockLng = ((time * 25) % 360) - 180;
                        coordsEl.innerText = `${mockLat.toFixed(4)}°, ${mockLng.toFixed(4)}°`;
                        
                        const demoLatLng = new L.LatLng(mockLat, mockLng);
                        issMarker.setLatLng(demoLatLng);
                        issMap.panTo(demoLatLng, { animate: false });
                    });
            }

            updatePosition();
            setInterval(updatePosition, 5000);
        } // Скобка закрывает trackISS()

        function changeLanguage(lang) {
            currentLang = lang;
            document.documentElement.lang = lang;
            document.body.setAttribute('dir', lang === 'he' ? 'rtl' : 'ltr');
            updateInterfaceTexts();
            initSkyMap();
            
            const locationEl = document.getElementById('iss-location-text');
            if(locationEl) locationEl.innerHTML = `🌍 Location: <span style="color:#aaa;">${translations[currentLang].waiting}</span>`;
            
            renderNews();
            renderLaunches();
        }

        function toggleMode() {
            currentMode = currentMode === 'regular' ? 'kids' : 'regular';
            document.getElementById('mode-btn').classList.toggle('active', currentMode === 'kids');
            updateInterfaceTexts();
            renderNews();
        }

        function updateInterfaceTexts() {
            const t = translations[currentLang];
            document.getElementById('site-title').textContent = t.title;
            document.getElementById('mode-btn').textContent = currentMode === 'regular' ? t.regular : t.kids;
            document.getElementById('dash-sky-title').textContent = t.dashSky;
            document.getElementById('dash-alert-title').textContent = t.dashAlert;
            document.getElementById('dash-iss-title').textContent = t.dashIss;
            document.getElementById('launches-heading').textContent = t.launches;
            
            const alertStatus = document.getElementById('launch-alert-status');
            if(alertStatus) alertStatus.textContent = t.telemetry;
        }

        window.onload = init;
    </script>
</body>
</html>
