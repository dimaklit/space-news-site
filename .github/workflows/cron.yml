name: Auto Update Space News

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Run scraper
      # Вот здесь мы явно передаем секретный ключ из настроек GitHub в Python
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python scraper.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        
        git add news.json launches.json
        
        if ! git diff-index --quiet HEAD; then
          git commit -m "Auto-update news and launch data [skip ci]"
          git pull --rebase origin main
          git push origin main
        else
          echo "No changes in space data detected. Skipping push."
        fi
