name: Auto Update Space News

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

# Даем явные права серверу на запись изменений в репозиторий
permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Скачиваем полную историю, чтобы избежать ошибки 128

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Run scraper
      run: python scraper.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        
        # Индексируем файлы данных
        git add news.json launches.json
        
        # Проверяем, есть ли реальные изменения в данных
        if ! git diff-index --quiet HEAD; then
          git commit -m "Auto-update news and launch data [skip ci]"
          
          # Забираем твои ручные правки с сайта, чтобы не было конфликта истории
          git pull --rebase origin main
          
          # Выталкиваем обновленные JSON-файлы на сайт
          git push origin main
        else
          echo "No changes in space data detected. Skipping push."
        fi
